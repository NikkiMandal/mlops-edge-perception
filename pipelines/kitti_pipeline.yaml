pipelineInfo:
  description: 'RT-DETR KITTI: data_prep -> train -> optimize -> monitor'
  name: kitti-rtdetr-pipeline
root:
  dag:
    tasks:
      data-prep-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-prep-component
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: bucket_name
            gcs_data_path:
              componentInputParameter: gcs_data_path
            num_train:
              componentInputParameter: num_train
            num_val:
              componentInputParameter: num_val
            project_id:
              componentInputParameter: project_id
        taskInfo:
          name: data-prep-component
      monitor-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-monitor-component
        dependentTasks:
        - optimize-component
        inputs:
          parameters:
            baseline_gcs_path:
              componentInputParameter: baseline_gcs_path
            bucket_name:
              componentInputParameter: bucket_name
            drift_threshold:
              componentInputParameter: drift_threshold
            new_data_gcs_path:
              componentInputParameter: new_data_gcs_path
            optimize_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: optimize-component
            project_id:
              componentInputParameter: project_id
        taskInfo:
          name: monitor-component
      optimize-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-optimize-component
        dependentTasks:
        - train-component
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: bucket_name
            model_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: train-component
            project_id:
              componentInputParameter: project_id
        taskInfo:
          name: optimize-component
      train-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-train-component
        dependentTasks:
        - data-prep-component
        inputs:
          parameters:
            batch_size:
              componentInputParameter: batch_size
            bucket_name:
              componentInputParameter: bucket_name
            dataset_uri:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: data-prep-component
            epochs:
              componentInputParameter: epochs
            gcs_data_path:
              componentInputParameter: gcs_data_path
            lr:
              componentInputParameter: lr
            project_id:
              componentInputParameter: project_id
            region:
              componentInputParameter: region
        taskInfo:
          name: train-component
  inputDefinitions:
    parameters:
      baseline_gcs_path:
        defaultValue: kitti/images/train
        isOptional: true
        parameterType: STRING
      batch_size:
        defaultValue: 8.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      bucket_name:
        defaultValue: mlops-edge-perception-bucket
        isOptional: true
        parameterType: STRING
      drift_threshold:
        defaultValue: 0.3
        isOptional: true
        parameterType: NUMBER_DOUBLE
      epochs:
        defaultValue: 20.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      gcs_data_path:
        defaultValue: kitti
        isOptional: true
        parameterType: STRING
      lr:
        defaultValue: 0.0001
        isOptional: true
        parameterType: NUMBER_DOUBLE
      new_data_gcs_path:
        defaultValue: kitti/images/val
        isOptional: true
        parameterType: STRING
      num_train:
        defaultValue: 400.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      num_val:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      project_id:
        defaultValue: mlops-edge-perception
        isOptional: true
        parameterType: STRING
      region:
        defaultValue: us-central1
        isOptional: true
        parameterType: STRING
