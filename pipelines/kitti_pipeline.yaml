# PIPELINE DEFINITION
# Name: kitti-rtdetr-pipeline
# Description: RT-DETR KITTI: data_prep -> train -> optimize -> monitor
# Inputs:
#    autolabel_samples: int [Default: 50.0]
#    baseline_gcs_path: str [Default: 'kitti/images/train']
#    batch_size: int [Default: 8.0]
#    bucket_name: str [Default: 'mlops-edge-perception-bucket']
#    drift_threshold: float [Default: 0.3]
#    epochs: int [Default: 20.0]
#    gcs_data_path: str [Default: 'kitti']
#    lr: float [Default: 0.0001]
#    new_data_gcs_path: str [Default: 'kitti/images/val']
#    num_train: int [Default: 400.0]
#    num_val: int [Default: 100.0]
#    project_id: str [Default: 'mlops-edge-perception']
#    region: str [Default: 'us-central1']
#    unlabeled_path: str [Default: 'kitti/images/val']
components:
  comp-autolabel-component:
    executorLabel: exec-autolabel-component
    inputDefinitions:
      parameters:
        box_threshold:
          parameterType: NUMBER_DOUBLE
        bucket_name:
          parameterType: STRING
        num_samples:
          parameterType: NUMBER_INTEGER
        output_gcs_path:
          parameterType: STRING
        project_id:
          parameterType: STRING
        unlabeled_path:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-data-prep-component:
    executorLabel: exec-data-prep-component
    inputDefinitions:
      parameters:
        bucket_name:
          parameterType: STRING
        gcs_data_path:
          parameterType: STRING
        num_train:
          parameterType: NUMBER_INTEGER
        num_val:
          parameterType: NUMBER_INTEGER
        project_id:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-monitor-component:
    executorLabel: exec-monitor-component
    inputDefinitions:
      parameters:
        baseline_gcs_path:
          parameterType: STRING
        bucket_name:
          parameterType: STRING
        drift_threshold:
          parameterType: NUMBER_DOUBLE
        new_data_gcs_path:
          parameterType: STRING
        optimize_uri:
          parameterType: STRING
        project_id:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: BOOLEAN
  comp-optimize-component:
    executorLabel: exec-optimize-component
    inputDefinitions:
      parameters:
        bucket_name:
          parameterType: STRING
        model_uri:
          parameterType: STRING
        project_id:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-train-component:
    executorLabel: exec-train-component
    inputDefinitions:
      parameters:
        batch_size:
          parameterType: NUMBER_INTEGER
        bucket_name:
          parameterType: STRING
        dataset_uri:
          parameterType: STRING
        epochs:
          parameterType: NUMBER_INTEGER
        gcs_data_path:
          parameterType: STRING
        lr:
          parameterType: NUMBER_DOUBLE
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-autolabel-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - autolabel_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-storage>=2.0.0'\
          \ 'Pillow>=9.0.0' 'tqdm>=4.0.0' 'transformers>=4.40.0' 'torch>=2.0.0' 'timm>=0.9.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef autolabel_component(\n    project_id:      str,\n    bucket_name:\
          \     str,\n    unlabeled_path:  str,\n    output_gcs_path: str,\n    num_samples:\
          \     int,\n    box_threshold:   float,\n) -> str:\n    \"\"\"\n    Stage\
          \ 1: Auto-label unlabeled images using Grounding DINO.\n    Uses open-vocabulary\
          \ detection with text prompts.\n    Returns GCS path to auto-labeled outputs.\n\
          \    \"\"\"\n    import json\n    import torch\n    from pathlib import\
          \ Path\n    from PIL import Image, ImageDraw\n    from google.cloud import\
          \ storage\n    from tqdm import tqdm\n    from transformers import AutoProcessor,\
          \ AutoModelForZeroShotObjectDetection\n\n    LOCAL_IMAGES = Path(\"/tmp/autolabel/images\"\
          )\n    LOCAL_OUTPUT = Path(\"/tmp/autolabel/outputs\")\n    TEXT_PROMPTS\
          \ = \"car . pedestrian . cyclist .\"\n    CLASSES      = {\"car\": 0, \"\
          pedestrian\": 1, \"cyclist\": 2}\n\n    # Download images\n    client  \
          \  = storage.Client(project=project_id)\n    bucket    = client.bucket(bucket_name)\n\
          \    blobs     = [b for b in bucket.list_blobs(prefix=unlabeled_path)\n\
          \                 if b.name.endswith(\".png\")][:num_samples]\n    LOCAL_IMAGES.mkdir(parents=True,\
          \ exist_ok=True)\n    for blob in blobs:\n        blob.download_to_filename(str(LOCAL_IMAGES\
          \ / Path(blob.name).name))\n    print(f\"Downloaded {len(blobs)} images\"\
          )\n\n    # Load Grounding DINO\n    model_id  = \"IDEA-Research/grounding-dino-tiny\"\
          \n    processor = AutoProcessor.from_pretrained(model_id)\n    model   \
          \  = AutoModelForZeroShotObjectDetection.from_pretrained(model_id)\n   \
          \ model.eval()\n    print(\"Grounding DINO loaded\")\n\n    # Auto-label\n\
          \    labels_dir = LOCAL_OUTPUT / \"labels\"\n    viz_dir    = LOCAL_OUTPUT\
          \ / \"visualizations\"\n    labels_dir.mkdir(parents=True, exist_ok=True)\n\
          \    viz_dir.mkdir(parents=True, exist_ok=True)\n\n    stats = {\"total\"\
          : 0, \"labeled\": 0, \"boxes\": 0}\n\n    for img_path in sorted(LOCAL_IMAGES.glob(\"\
          *.png\")):\n        stats[\"total\"] += 1\n        try:\n            img_pil\
          \ = Image.open(img_path).convert(\"RGB\")\n            w, h    = img_pil.size\n\
          \            inputs  = processor(\n                images=img_pil,\n   \
          \             text=TEXT_PROMPTS,\n                return_tensors=\"pt\"\n\
          \            )\n            with torch.no_grad():\n                outputs\
          \ = model(**inputs)\n\n            results = processor.post_process_grounded_object_detection(\n\
          \                outputs,\n                threshold=box_threshold,\n  \
          \              target_sizes=[(h, w)]\n            )[0]\n\n            boxes\
          \  = results[\"boxes\"].tolist()\n            labels = results.get(\"text_labels\"\
          , results.get(\"labels\", []))\n            yolo_lines = []\n          \
          \  for box, label in zip(boxes, labels):\n                label_str = label\
          \ if isinstance(label, str) else str(label)\n                class_id  =\
          \ CLASSES.get(label_str.lower().strip(), -1)\n                if class_id\
          \ == -1:\n                    continue\n                x1, y1, x2, y2 =\
          \ box\n                cx = (x1 + x2) / 2 / w\n                cy = (y1\
          \ + y2) / 2 / h\n                bw = (x2 - x1) / w\n                bh\
          \ = (y2 - y1) / h\n                if bw > 0 and bh > 0:\n             \
          \       yolo_lines.append(\n                        f\"{class_id} {cx:.6f}\
          \ {cy:.6f} {bw:.6f} {bh:.6f}\"\n                    )\n\n            if\
          \ yolo_lines:\n                (labels_dir / img_path.with_suffix(\".txt\"\
          ).name).write_text(\n                    \"\\n\".join(yolo_lines)\n    \
          \            )\n                stats[\"labeled\"] += 1\n              \
          \  stats[\"boxes\"]   += len(yolo_lines)\n\n        except Exception as\
          \ e:\n            print(f\"Error on {img_path.name}: {e}\")\n\n    print(f\"\
          Labeled {stats['labeled']}/{stats['total']} images, \"\n          f\"{stats['boxes']}\
          \ boxes\")\n\n    # Upload to GCS\n    for f in LOCAL_OUTPUT.rglob(\"*\"\
          ):\n        if f.is_file():\n            rel = f.relative_to(LOCAL_OUTPUT)\n\
          \            bucket.blob(\n                f\"{output_gcs_path}/{rel}\"\
          .replace(\"\\\\\", \"/\")\n            ).upload_from_filename(str(f))\n\n\
          \    return f\"gs://{bucket_name}/{output_gcs_path}\"\n\n"
        image: python:3.10-slim
    exec-data-prep-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - data_prep_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-storage>=2.0.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef data_prep_component(\n    project_id: str,\n    bucket_name:\
          \ str,\n    gcs_data_path: str,\n    num_train: int,\n    num_val: int,\n\
          ) -> str:\n    \"\"\"\n    Verify KITTI data exists in GCS.\n    Data was\
          \ pre-uploaded via prepare_dataset.py.\n    \"\"\"\n    from google.cloud\
          \ import storage\n\n    client = storage.Client(project=project_id)\n  \
          \  blobs  = list(client.bucket(bucket_name).list_blobs(\n        prefix=f\"\
          {gcs_data_path}/images/train\", max_results=5\n    ))\n\n    if len(blobs)\
          \ == 0:\n        raise RuntimeError(\n            f\"No data found at gs://{bucket_name}/{gcs_data_path}.\
          \ \"\n            f\"Run data/prepare_dataset.py first.\"\n        )\n\n\
          \    print(f\"Data verified at gs://{bucket_name}/{gcs_data_path}\")\n \
          \   print(f\"Found {len(blobs)}+ files\")\n    return f\"gs://{bucket_name}/{gcs_data_path}\"\
          \n\n"
        image: python:3.10-slim
    exec-monitor-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - monitor_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'evidently==0.7.21'\
          \ 'pandas>=2.0.0' 'numpy>=1.24.0' 'google-cloud-storage>=2.0.0' 'Pillow>=9.0.0'\
          \ 'scikit-learn>=1.3.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef monitor_component(\n    project_id:        str,\n    bucket_name:\
          \       str,\n    baseline_gcs_path: str,\n    new_data_gcs_path: str,\n\
          \    drift_threshold:   float,\n    optimize_uri:      str,\n) -> bool:\n\
          \    \"\"\"\n    Detect image feature drift between baseline (train) and\
          \ new data (val)\n    using Evidently. Uploads a drift summary JSON to GCS.\n\
          \    Returns True if retraining should be triggered.\n    \"\"\"\n    import\
          \ json\n    import numpy as np\n    import pandas as pd\n    from pathlib\
          \ import Path\n    from datetime import datetime\n    from PIL import Image\n\
          \    from google.cloud import storage\n    from evidently import Report,\
          \ Dataset\n    from evidently.presets import DataDriftPreset\n\n    LOCAL_BASE\
          \  = Path(\"/tmp/drift/baseline\")\n    LOCAL_NEW   = Path(\"/tmp/drift/new_data\"\
          )\n    REPORTS_DIR = Path(\"/tmp/drift/reports\")\n    NUM_SAMPLES = 100\n\
          \n    def download_images(gcs_prefix: str, local_dir: Path) -> None:\n \
          \       client = storage.Client(project=project_id)\n        blobs  = [b\
          \ for b in client.bucket(bucket_name).list_blobs(\n            prefix=gcs_prefix\n\
          \        ) if b.name.endswith(\".png\")][:NUM_SAMPLES]\n        if not blobs:\n\
          \            raise FileNotFoundError(\n                f\"No images at gs://{bucket_name}/{gcs_prefix}\"\
          \n            )\n        local_dir.mkdir(parents=True, exist_ok=True)\n\
          \        for blob in blobs:\n            dest = local_dir / Path(blob.name).name\n\
          \            if not dest.exists():\n                blob.download_to_filename(str(dest))\n\
          \        print(f\"Downloaded {len(blobs)} images \u2192 {local_dir}\")\n\
          \n    def extract_features(img_dir: Path) -> pd.DataFrame:\n        rows\
          \ = []\n        for p in sorted(img_dir.glob(\"*.png\")):\n            arr\
          \     = np.array(Image.open(p).convert(\"RGB\"), dtype=np.float32) / 255.0\n\
          \            r, g, b = arr[:, :, 0], arr[:, :, 1], arr[:, :, 2]\n      \
          \      rows.append({\n                \"mean_brightness\": float(arr.mean()),\n\
          \                \"std_brightness\":  float(arr.std()),\n              \
          \  \"mean_r\":          float(r.mean()),\n                \"mean_g\":  \
          \        float(g.mean()),\n                \"mean_b\":          float(b.mean()),\n\
          \                \"std_r\":           float(r.std()),\n                \"\
          std_g\":           float(g.std()),\n                \"std_b\":         \
          \  float(b.std()),\n                \"p25\":             float(np.percentile(arr,\
          \ 25)),\n                \"p75\":             float(np.percentile(arr, 75)),\n\
          \                \"iqr\":             float(\n                    np.percentile(arr,\
          \ 75) - np.percentile(arr, 25)\n                ),\n            })\n   \
          \     df = pd.DataFrame(rows)\n        print(f\"  Extracted {len(df)} feature\
          \ vectors from {img_dir.name}\")\n        return df\n\n    # Download samples\n\
          \    download_images(baseline_gcs_path, LOCAL_BASE)\n    download_images(new_data_gcs_path,\
          \ LOCAL_NEW)\n\n    # Extract features\n    baseline_df = extract_features(LOCAL_BASE)\n\
          \    new_data_df = extract_features(LOCAL_NEW)\n\n    # Run Evidently drift\
          \ report\n    print(\"\\nRunning Evidently drift detection...\")\n    report\
          \ = Report([DataDriftPreset()])\n    result = report.run(\n        reference_data=Dataset.from_pandas(baseline_df),\n\
          \        current_data=Dataset.from_pandas(new_data_df),\n    )\n    res_dict\
          \    = result.dict()\n    drift_share = float(res_dict.get(\"drift_share\"\
          , 0.0))\n    retrain     = drift_share > drift_threshold\n\n    print(f\"\
          Drift share:    {drift_share * 100:.1f}%\")\n    print(f\"Threshold:   \
          \   {drift_threshold * 100:.0f}%\")\n    print(f\"Retrain needed: {retrain}\"\
          )\n\n    # Save summary\n    timestamp = datetime.now().strftime(\"%Y%m%d_%H%M%S\"\
          )\n    summary = {\n        \"timestamp\":      timestamp,\n        \"drift_share\"\
          :    drift_share,\n        \"drift_detected\": retrain,\n        \"threshold\"\
          :      drift_threshold,\n        \"action\":         \"retrain\" if retrain\
          \ else \"none\",\n    }\n    REPORTS_DIR.mkdir(parents=True, exist_ok=True)\n\
          \    summary_path = REPORTS_DIR / f\"drift_summary_{timestamp}.json\"\n\
          \    summary_path.write_text(json.dumps(summary, indent=2))\n\n    client\
          \     = storage.Client(project=project_id)\n    gcs_report = f\"monitoring/drift_reports/{summary_path.name}\"\
          \n    client.bucket(bucket_name).blob(gcs_report).upload_from_filename(\n\
          \        str(summary_path)\n    )\n    print(f\"Report \u2192 gs://{bucket_name}/{gcs_report}\"\
          )\n\n    return retrain\n\n"
        image: python:3.10-slim
    exec-optimize-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - optimize_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'torch>=2.0.0'\
          \ 'transformers==4.40.0' 'timm' 'onnx>=1.14.0' 'onnxruntime>=1.16.0' 'onnxscript'\
          \ 'google-cloud-storage>=2.0.0' 'numpy>=1.24.0' 'Pillow>=9.0.0'  &&  python3\
          \ -m pip install --quiet --no-warn-script-location 'kfp==2.16.0' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef optimize_component(\n    project_id:  str,\n    bucket_name:\
          \ str,\n    model_uri:   str,\n) -> str:\n    \"\"\"\n    Download trained\
          \ model, export to ONNX, benchmark FP32/ONNX/INT8-PTQ,\n    upload results\
          \ to GCS. Returns GCS path to optimization outputs.\n    \"\"\"\n    import\
          \ json\n    import time\n    import torch\n    import gc\n    import numpy\
          \ as np\n    import onnxruntime as ort\n    from pathlib import Path\n \
          \   from transformers import AutoModelForObjectDetection\n    from google.cloud\
          \ import storage\n\n    LOCAL_MODEL = Path(\"/tmp/rtdetr_model\")\n    OUTPUT_DIR\
          \  = Path(\"/tmp/optimize_outputs\")\n    OUTPUT_DIR.mkdir(parents=True,\
          \ exist_ok=True)\n\n    MODEL_GCS_PREFIX = model_uri.replace(f\"gs://{bucket_name}/\"\
          , \"\")\n    DUMMY_SHAPE      = (1, 3, 640, 640)\n    WARMUP           =\
          \ 5\n    BENCH_RUNS       = 20\n\n    # \u2500\u2500 Download model \u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    print(f\"Downloading\
          \ model from gs://{bucket_name}/{MODEL_GCS_PREFIX}...\")\n    client = storage.Client(project=project_id)\n\
          \    bucket = client.bucket(bucket_name)\n    blobs  = [b for b in bucket.list_blobs(prefix=MODEL_GCS_PREFIX)\n\
          \              if not b.name.endswith(\"/\")]\n\n    if not blobs:\n   \
          \     raise RuntimeError(f\"No model blobs at gs://{bucket_name}/{MODEL_GCS_PREFIX}\"\
          )\n\n    LOCAL_MODEL.mkdir(parents=True, exist_ok=True)\n    for blob in\
          \ blobs:\n        rel  = blob.name[len(MODEL_GCS_PREFIX) + 1:]\n       \
          \ dest = LOCAL_MODEL / rel\n        dest.parent.mkdir(parents=True, exist_ok=True)\n\
          \        blob.download_to_filename(str(dest))\n    print(f\"Downloaded {len(blobs)}\
          \ files\")\n\n    model = AutoModelForObjectDetection.from_pretrained(str(LOCAL_MODEL))\n\
          \    model.eval()\n\n    # \u2500\u2500 Timing helper \u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    def bench_torch(m, inp,\
          \ label: str):\n        with torch.no_grad():\n            for _ in range(WARMUP):\n\
          \                m(pixel_values=inp)\n        lats = []\n        with torch.no_grad():\n\
          \            for _ in range(BENCH_RUNS):\n                t0 = time.perf_counter()\n\
          \                m(pixel_values=inp)\n                lats.append((time.perf_counter()\
          \ - t0) * 1000)\n        ms   = float(np.mean(lats))\n        fps  = 1000.0\
          \ / ms\n        size = sum(\n            p.numel() * p.element_size() for\
          \ p in m.parameters()\n        ) / (1024 * 1024)\n        print(f\"  {label}:\
          \ {ms:.1f}ms | {fps:.1f} FPS | {size:.1f}MB\")\n        return ms, fps,\
          \ size\n\n    results = {}\n    dummy   = torch.randn(DUMMY_SHAPE)\n\n \
          \   # FP32 baseline\n    ms, fps, size = bench_torch(model, dummy, \"PyTorch\
          \ FP32\")\n    results[\"pytorch_fp32\"] = {\n        \"format\": \"PyTorch\
          \ FP32\",\n        \"latency_ms\": round(ms, 2),\n        \"fps\":     \
          \   round(fps, 1),\n        \"size_mb\":    round(size, 1),\n    }\n\n \
          \   # \u2500\u2500 Export ONNX \u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
