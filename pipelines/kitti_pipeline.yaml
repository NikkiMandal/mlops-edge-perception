    exec-train-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - train_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-aiplatform>=1.38.0'\
          \ 'google-cloud-storage>=2.0.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_component(\n    project_id:    str,\n    region:      \
          \  str,\n    bucket_name:   str,\n    gcs_data_path: str,\n    epochs: \
          \       int,\n    batch_size:    int,\n    lr:            float,\n    dataset_uri:\
          \   str,\n) -> str:\n    \"\"\"\n    Submit Vertex AI Custom Training Job\
          \ running training/train.py on a T4 GPU.\n    The training script is fetched\
          \ from gs://{bucket_name}/scripts/train.py.\n    Returns GCS path to the\
          \ saved model.\n    \"\"\"\n    import google.cloud.aiplatform as aip\n\
          \    from datetime import datetime\n\n    aip.init(project=project_id, location=region,\n\
          \             staging_bucket=f\"gs://{bucket_name}\")\n\n    timestamp =\
          \ datetime.now().strftime(\"%Y%m%d%H%M%S\")\n    job_name  = f\"rtdetr-kitti-{timestamp}\"\
          \n\n    train_image = (\n        \"us-docker.pkg.dev/vertex-ai/training/pytorch-gpu.2-1.py310:latest\"\
          \n    )\n\n    train_cmd = (\n        \"pip install -q transformers>=4.30.0\
          \ google-cloud-storage Pillow tqdm && \"\n        f\"gsutil cp gs://{bucket_name}/scripts/train.py\
          \ /tmp/train.py && \"\n        f\"python /tmp/train.py \"\n        f\"--epochs={epochs}\
          \ \"\n        f\"--batch_size={batch_size} \"\n        f\"--lr={lr} \"\n\
          \        f\"--bucket_name={bucket_name} \"\n        f\"--gcs_data_path={gcs_data_path}\
          \ \"\n        \"--output_dir=/tmp/model_output\"\n    )\n\n    worker_pool_specs\
          \ = [{\n        \"machine_spec\": {\n            \"machine_type\":     \
          \  \"n1-standard-4\",\n            \"accelerator_type\":   \"NVIDIA_TESLA_T4\"\
          ,\n            \"accelerator_count\":  1,\n        },\n        \"replica_count\"\
          : 1,\n        \"container_spec\": {\n            \"image_uri\": train_image,\n\
          \            \"command\":   [\"bash\", \"-c\"],\n            \"args\": \
          \     [train_cmd],\n        },\n    }]\n\n    print(f\"Submitting job: {job_name}\"\
          )\n    job = aip.CustomJob(\n        display_name      = job_name,\n   \
          \     worker_pool_specs = worker_pool_specs,\n        staging_bucket   \
          \ = f\"gs://{bucket_name}\",\n    )\n    job.run(sync=True)\n    print(f\"\
          Job state: {job.state}\")\n\n    model_uri = f\"gs://{bucket_name}/models/rtdetr_kitti\"\
          \n    print(f\"Model available at: {model_uri}\")\n    return model_uri\n\
          \n"
