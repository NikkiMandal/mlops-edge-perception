          \        training            = torch.onnx.TrainingMode.EVAL,\n    )\n  \
          \  onnx_size = onnx_path.stat().st_size / (1024 * 1024)\n    print(f\"ONNX\
          \ saved: {onnx_size:.1f}MB\")\n\n    # Benchmark ONNX FP32\n    sess   \
          \  = ort.InferenceSession(str(onnx_path), providers=[\"CPUExecutionProvider\"\
          ])\n    inp_np   = np.random.randn(*DUMMY_SHAPE).astype(np.float32)\n  \
          \  for _ in range(WARMUP):\n        sess.run(None, {\"pixel_values\": inp_np})\n\
          \    lats = []\n    for _ in range(BENCH_RUNS):\n        t0 = time.perf_counter()\n\
          \        sess.run(None, {\"pixel_values\": inp_np})\n        lats.append((time.perf_counter()\
          \ - t0) * 1000)\n    onnx_ms  = float(np.mean(lats))\n    onnx_fps = 1000.0\
          \ / onnx_ms\n    print(f\"  ONNX FP32: {onnx_ms:.1f}ms | {onnx_fps:.1f}\
          \ FPS | {onnx_size:.1f}MB\")\n    results[\"onnx_fp32\"] = {\n        \"\
          format\":     \"ONNX FP32\",\n        \"latency_ms\": round(onnx_ms, 2),\n\
          \        \"fps\":        round(onnx_fps, 1),\n        \"size_mb\":    round(onnx_size,\
          \ 1),\n    }\n\n    # \u2500\u2500 INT8 PTQ using ONNX Runtime \u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    try:\n     \
          \   from onnxruntime.quantization import quantize_dynamic, QuantType\n \
          \       int8_path = OUTPUT_DIR / \"rtdetr_int8.onnx\"\n        quantize_dynamic(\n\
          \            model_input  = str(onnx_path),\n            model_output =\
          \ str(int8_path),\n            weight_type  = QuantType.QInt8,\n       \
          \ )\n        int8_size = int8_path.stat().st_size / (1024 * 1024)\n    \
          \    # Benchmark INT8\n        sess_int8 = ort.InferenceSession(str(int8_path),\
          \ providers=[\"CPUExecutionProvider\"])\n        lats = []\n        for\
          \ _ in range(BENCH_RUNS):\n            t0 = time.perf_counter()\n      \
          \      sess_int8.run(None, {\"pixel_values\": inp_np})\n            lats.append((time.perf_counter()\
          \ - t0) * 1000)\n        int8_ms  = float(np.mean(lats))\n        int8_fps\
          \ = 1000.0 / int8_ms\n        print(f\"  ONNX INT8: {int8_ms:.1f}ms | {int8_fps:.1f}\
          \ FPS | {int8_size:.1f}MB\")\n        results[\"int8_ptq\"] = {\n      \
          \      \"format\":     \"ONNX INT8 PTQ\",\n            \"latency_ms\": round(int8_ms,\
          \ 2),\n            \"fps\":        round(int8_fps, 1),\n            \"size_mb\"\
          :    round(int8_size, 1),\n        }\n    except Exception as e:\n     \
          \   print(f\"INT8 skipped: {e}\")\n        results[\"int8_ptq\"] = {\"format\"\
          : \"ONNX INT8 PTQ\", \"error\": str(e)}\n\n    # \u2500\u2500 Upload results\
          \ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
