          \n    print(\"\\nExporting ONNX (opset 17)...\")\n    gc.collect()\n   \
          \ torch.cuda.empty_cache() if torch.cuda.is_available() else None\n    torch.onnx.export(\n\
          \        model,\n        (dummy,),\n        str(onnx_path),\n        opset_version\
