          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    bench_path =\
          \ OUTPUT_DIR / \"benchmark_results.json\"\n    bench_path.write_text(json.dumps(results,\
          \ indent=2))\n\n    gcs_out_prefix = \"models/rtdetr_kitti/optimized\"\n\
          \    files_to_upload = [onnx_path, bench_path]\n    if (OUTPUT_DIR / \"\
