          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'google-cloud-aiplatform>=1.38.0'\
          \ 'google-cloud-storage>=2.0.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
